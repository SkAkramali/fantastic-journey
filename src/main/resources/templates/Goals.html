<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Goals | FitTrack</title>

    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">

    <style>
        body {
            margin: 0;
            font-family: 'Instrument Sans', sans-serif;
            background: #faf9f6;
        }

        .container {
            padding: 30px;
            max-width: 900px;
            margin: auto;
        }

        h2 {
            font-family: 'Bricolage Grotesque';
            margin-bottom: 20px;
        }

        .goal-card {
            background: white;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .goal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .goal-title {
            font-weight: 700;
            font-size: 16px;
        }

        .status {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
        }

        .active {
            background: #e8f5e9;
            color: #2f6b3e;
        }

        .completed {
            background: #e0f7fa;
            color: #00796b;
        }

        /* 🔥 FIXED PROGRESS */
        .progress {
            margin-top: 10px;
            height: 10px;
            background: #eee;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: #2f6b3e;
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        .goal-info {
            margin-top: 10px;
            font-size: 14px;
            color: #666;
        }

        .progress-text {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }

        .extra {
            font-size: 12px;
            color: #2f6b3e;
            margin-top: 4px;
        }

        .empty-box {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 16px;
        }

        .btn-main {
            margin-top: 15px;
            background: #2f6b3e;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer;
        }

        .btn-main:hover {
            background: #255730;
        }
    </style>
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar('goals')}"></div>

<div class="container">

    <h2>🎯 My Goals</h2>

    <!-- GOALS -->
    <div th:if="${goals != null and !#lists.isEmpty(goals)}">

        <div th:each="g : ${goals}" class="goal-card">

            <!-- HEADER -->
            <div class="goal-header">

                <div class="goal-title"
                     th:text="${g.goalType.toString().replace('_',' ')}">
                </div>

                <div class="status"
                     th:classappend="${g.status == 'ACTIVE'} ? ' active' : ' completed'"
                     th:text="${g.status}">
                </div>

            </div>

            <!-- VALUES -->
            <div>
                <span th:text="${g.currentValue}">0</span> /
                <span th:text="${g.targetValue}">10</span>
            </div>

            <!-- 🔥 FIXED PROGRESS BAR -->
            <div class="progress">
                <div class="progress-bar"
                     th:with="percent=${g.targetValue == 0 ? 0 : (g.currentValue * 100.0 / g.targetValue)}"
                     th:style="'width:' + (${percent > 100 ? 100 : percent}) + '%'">
                </div>
            </div>

            <!-- 🔥 FIXED TEXT -->
            <div class="progress-text"
                 th:with="percent=${g.targetValue == 0 ? 0 : (g.currentValue * 100.0 / g.targetValue)}">

                <span th:text="${#numbers.formatDecimal(percent > 100 ? 100 : percent, 0, 1)}"></span>%

                <!-- EXTRA -->
                <div class="extra" th:if="${percent > 100}">
                    🎉 Extra:
                    <span th:text="${g.currentValue - g.targetValue}"></span>
                </div>

            </div>

            <!-- DATES -->
            <div class="goal-info">
                📅 <span th:text="${g.startDate}"></span>
                → <span th:text="${g.endDate}"></span>
            </div>

            <!-- NOTES -->
            <div class="goal-info"
                 th:if="${g.notes != null and g.notes != ''}">
                📝 <span th:text="${g.notes}"></span>
            </div>

        </div>

    </div>

    <!-- EMPTY -->
    <div th:if="${goals == null or #lists.isEmpty(goals)}" class="empty-box">

        <p>No goals set yet 🎯</p>

        <a href="/dashboard/setGoal">
            <button class="btn-main">Set Your First Goal</button>
        </a>

    </div>

</div>

</body>
</html>

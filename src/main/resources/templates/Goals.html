<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Goals | FitTrack</title>

    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">

    <style>
        body {
            margin: 0;
            font-family: 'Instrument Sans', sans-serif;
            background: linear-gradient(135deg, #f5f7fa, #e4efe9);
        }

        .container {
            padding: 30px;
            max-width: 950px;
            margin: auto;
        }

        h2 {
            font-family: 'Bricolage Grotesque';
            margin-bottom: 25px;
            font-size: 26px;
        }

        /* 🔥 MODERN CARD */
        .goal-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            padding: 22px;
            border-radius: 18px;
            margin-bottom: 22px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .goal-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.12);
        }

        .goal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .goal-title {
            font-weight: 700;
            font-size: 17px;
        }

        .status {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .active {
            background: #e8f5e9;
            color: #2f6b3e;
        }

        .completed {
            background: #e0f7fa;
            color: #00796b;
        }

        .goal-info {
            margin-top: 10px;
            font-size: 14px;
            color: #555;
        }

        /* 🔥 RINGS */
        .rings {
            position: relative;
            width: 100px;
            height: 100px;
        }

        .ring {
            position: absolute;
            border-radius: 50%;
        }

        .ring.outer {
            width: 100px;
            height: 100px;
            background: conic-gradient(#2f6b3e var(--p), #eee 0);
            animation: fillAnim 1.2s ease;
            box-shadow: 0 0 12px rgba(47,107,62,0.4);
        }

        .ring.inner {
            width: 70px;
            height: 70px;
            top: 15px;
            left: 15px;
            background: conic-gradient(#38bdf8 var(--p2), #ddd 0);
            animation: fillAnim 1.2s ease;
        }

        .ring::before {
            content: "";
            position: absolute;
            inset: 10px;
            background: white;
            border-radius: 50%;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
        }

        .ring span {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            color: #2f6b3e;
            z-index: 2;
        }

        @keyframes fillAnim {
            from {
                transform: scale(0.85);
                opacity: 0.6;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* 🔥 PROGRESS */
        .goal-progress-container {
            display: flex;
            align-items: center;
            gap: 22px;
            margin-top: 18px;
        }

        .progress-details {
            font-size: 15px;
            font-weight: 500;
        }

        .progress-details strong {
            font-size: 18px;
            color: #2f6b3e;
        }

        .extra {
            font-size: 12px;
            color: #16a34a;
            margin-top: 5px;
            font-weight: 600;
        }

        /* EMPTY */
        .empty-box {
            text-align: center;
            padding: 50px;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(10px);
            border-radius: 18px;
        }

        .btn-main {
            margin-top: 15px;
            background: linear-gradient(135deg, #2f6b3e, #4ade80);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-main:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>

<body>

<!-- ✅ HEADER (UNCHANGED) -->
<div th:replace="~{fragments/navbar :: navbar('goals')}"></div>

<div class="container">

    <h2>🎯 My Goals</h2>

    <div th:if="${goals != null and !#lists.isEmpty(goals)}">

        <div th:each="g : ${goals}" class="goal-card">

            <!-- HEADER -->
            <div class="goal-header">
                <div class="goal-title"
                     th:text="${g.goalType.toString().replace('_',' ')}"></div>

                <div class="status"
                     th:classappend="${g.status == 'ACTIVE'} ? ' active' : ' completed'"
                     th:text="${g.status}"></div>
            </div>

            <!-- 🔥 PROGRESS -->
            <div class="goal-progress-container">

                <div class="rings"
                     th:with="
                     p=${g.targetValue == 0 ? 0 : (g.currentValue * 100.0 / g.targetValue)},
                     safe=${p > 100 ? 100 : p},
                     extra=${p > 100 ? p - 100 : 0}">

                    <!-- OUTER -->
                    <div class="ring outer"
                         th:style="'--p:' + ${safe} + '%'">
                        <span th:text="${#numbers.formatDecimal(safe,0,0)} + '%'"></span>
                    </div>

                    <!-- INNER -->
                    <div class="ring inner"
                         th:if="${extra > 0}"
                         th:style="'--p2:' + (${extra > 100 ? 100 : extra}) + '%'">
                    </div>

                </div>

                <!-- DETAILS -->
                <div class="progress-details">
                    <div>
                        <strong th:text="${g.currentValue}"></strong>
                        <span style="color:#888;"> of </span>
                        <span th:text="${g.targetValue}"></span>
                    </div>

                    <div class="extra" th:if="${g.currentValue > g.targetValue}">
                        🎉 Extra Progress!
                    </div>
                </div>

            </div>

            <!-- DATES -->
            <div class="goal-info">
                📅 <span th:text="${g.startDate}"></span>
                → <span th:text="${g.endDate}"></span>
            </div>

            <!-- NOTES -->
            <div class="goal-info"
                 th:if="${g.notes != null and g.notes != ''}">
                📝 <span th:text="${g.notes}"></span>
            </div>

        </div>

    </div>

    <!-- EMPTY -->
    <div th:if="${goals == null or #lists.isEmpty(goals)}" class="empty-box">
        <p>No goals set yet 🎯</p>

        <a href="/dashboard/setGoal">
            <button class="btn-main">Set Your First Goal</button>
        </a>
    </div>

</div>

</body>
</html>

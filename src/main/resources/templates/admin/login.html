<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — FitTrack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #0f0f0e;
            --surface:   #1a1916;
            --surface-2: #232220;
            --border:    rgba(255,255,255,0.08);
            --border-md: rgba(255,255,255,0.13);
            --ink:       #f5f4f1;
            --ink-2:     #a09d97;
            --ink-3:     #6b6860;
            --accent:    #2f6b3e;
            --accent-lt: rgba(47,107,62,0.2);
            --accent-bd: rgba(47,107,62,0.4);
            --red:       #ef4444;
            --red-lt:    rgba(239,68,68,0.15);
        }

        html, body { height: 100%; }

        body {
            font-family: 'Instrument Sans', sans-serif;
            background: var(--bg);
            color: var(--ink);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        /* BG GRID */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
            background-size: 32px 32px;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            top: -200px; left: 50%; transform: translateX(-50%);
            width: 600px; height: 400px;
            background: radial-gradient(ellipse, rgba(47,107,62,0.18) 0%, transparent 70%);
            pointer-events: none;
        }

        .login-wrap {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 400px;
        }

        /* HEADER */
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            margin-bottom: 1.8rem;
        }

        .login-logo-mark {
            width: 38px; height: 38px;
            background: var(--accent);
            border-radius: 11px;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Bricolage Grotesque', sans-serif;
            font-weight: 800; font-size: 1.1rem;
            color: #fff;
        }

        .login-logo-name {
            font-family: 'Bricolage Grotesque', sans-serif;
            font-weight: 700; font-size: 1.2rem;
            color: var(--ink); letter-spacing: -0.02em;
        }

        .admin-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--accent-lt);
            border: 1px solid var(--accent-bd);
            color: #6fcf7a;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 4px 12px;
            border-radius: 20px;
            margin-bottom: 1.2rem;
        }

        .admin-dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: #6fcf7a;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.4; transform: scale(0.7); }
        }

        .login-title {
            font-family: 'Bricolage Grotesque', sans-serif;
            font-size: 1.6rem; font-weight: 800;
            color: var(--ink); letter-spacing: -0.035em;
            margin-bottom: 0.4rem;
        }

        .login-subtitle { font-size: 0.86rem; color: var(--ink-2); }

        /* CARD */
        .login-card {
            background: var(--surface);
            border: 1px solid var(--border-md);
            border-radius: 16px;
            padding: 1.8rem;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 24px 64px rgba(0,0,0,0.4);
        }

        /* ERROR */
        .error-banner {
            display: flex;
            align-items: center;
            gap: 9px;
            background: var(--red-lt);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 9px;
            padding: 0.75rem 1rem;
            margin-bottom: 1.2rem;
            font-size: 0.83rem;
            color: #fca5a5;
        }

        /* FORM */
        .form-group { margin-bottom: 1rem; }

        .form-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--ink-2);
            text-transform: uppercase;
            letter-spacing: 0.07em;
            margin-bottom: 0.42rem;
        }

        .form-input {
            width: 100%;
            padding: 0.78rem 1rem;
            background: var(--surface-2);
            border: 1px solid var(--border-md);
            border-radius: 9px;
            font-family: 'Instrument Sans', sans-serif;
            font-size: 0.9rem;
            color: var(--ink);
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .form-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(47,107,62,0.2);
        }

        .form-input::placeholder { color: var(--ink-3); }

        .btn-submit {
            width: 100%;
            padding: 0.85rem;
            margin-top: 0.6rem;
            background: var(--accent);
            color: #fff;
            font-family: 'Instrument Sans', sans-serif;
            font-size: 0.92rem;
            font-weight: 600;
            border: none;
            border-radius: 9px;
            cursor: pointer;
            transition: background 0.15s, transform 0.12s;
        }

        .btn-submit:hover {
            background: #255730;
            transform: translateY(-1px);
        }

        /* CREDENTIALS HINT */
        .credentials-hint {
            margin-top: 1.4rem;
            padding: 0.9rem 1rem;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 9px;
        }

        .ch-title {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--ink-3);
            margin-bottom: 0.6rem;
        }

        .ch-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--ink-2);
            margin-bottom: 3px;
        }

        .ch-row:last-child { margin-bottom: 0; }
        .ch-key { color: var(--ink-3); }
        .ch-val { font-weight: 600; color: var(--ink); font-family: monospace; font-size: 0.85rem; }

        /* BACK LINK */
        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.4rem;
            font-size: 0.83rem;
            color: var(--ink-3);
            text-decoration: none;
            transition: color 0.12s;
        }

        .back-link:hover { color: var(--ink-2); }
    </style>
</head>
<body>

<div class="login-wrap">

    <div class="login-header">
        <a href="/" class="login-logo">
            <div class="login-logo-mark">F</div>
            <span class="login-logo-name">FitTrack</span>
        </a>
        <div>
            <div class="admin-badge">
                <span class="admin-dot"></span>
                Admin Portal
            </div>
        </div>
        <div class="login-title">Administrator Login</div>
        <div class="login-subtitle">Restricted access — authorised personnel only.</div>
    </div>

    <div class="login-card">

        <div class="error-banner" th:if="${param.error}">
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                <circle cx="7.5" cy="7.5" r="6" stroke="#fca5a5" stroke-width="1.3"/>
                <path d="M7.5 4.5v3.5M7.5 10v.5" stroke="#fca5a5" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            Invalid credentials. Please try again.
        </div>

        <form action="/admin/login" method="post">

            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input type="text" id="username" name="username"
                       class="form-input" placeholder="admin" required autocomplete="username">
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" name="password"
                       class="form-input" placeholder="••••••••" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn-submit">Sign In to Admin Console →</button>

        </form>

        <div class="credentials-hint">
            <div class="ch-title">Default Credentials</div>
            <div class="ch-row">
                <span class="ch-key">Username</span>
                <span class="ch-val">admin</span>
            </div>
            <div class="ch-row">
                <span class="ch-key">Password</span>
                <span class="ch-val">admin123</span>
            </div>
        </div>

    </div>

    <a href="/" class="back-link">← Back to FitTrack</a>

</div>

</body>
</html>

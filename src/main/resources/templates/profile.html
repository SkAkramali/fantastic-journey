<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Profile | FitTrack</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/css/styles.css">
    <style>
        body {
            background: #faf9f6;
            font-family: 'Segoe UI', sans-serif;
            color: #1a1916;
        }

        /* NAVBAR (same vibe as landing) */
        .navbar {
            background: rgba(250,249,246,0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            padding: 12px 30px;
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 18px;
        }

        .btn-dark-custom {
            background: #1a1916;
            color: white;
            border-radius: 30px;
            padding: 6px 16px;
        }

        .btn-dark-custom:hover {
            background: #2f6b3e;
        }

        /* PROFILE CARD */
        .profile-wrapper {
            margin-top: 100px;
        }

        .profile-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.06);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .profile-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .avatar {
            width: 90px;
            height: 90px;
            background: #2f6b3e;
            border-radius: 50%;
            color: white;
            font-size: 28px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: auto;
        }

        .profile-name {
            font-size: 22px;
            font-weight: 600;
            margin-top: 10px;
        }

        .profile-email {
            color: #777;
            font-size: 14px;
        }

        /* INFO GRID */
        .info-box {
            background: #f4f7fb;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
        }

        .info-label {
            font-size: 12px;
            color: #777;
        }

        .info-value {
            font-size: 18px;
            font-weight: 600;
            margin-top: 5px;
        }

        .btn-main {
            background: #2f6b3e;
            color: white;
            border-radius: 30px;
            padding: 10px;
        }

        .btn-main:hover {
            background: #255a33;
        }

    </style>
</head>

<body>

<!-- 🔥 NAVBAR -->
<nav th:replace="fragments/navbar :: navbar('profile')"></nav><div class="container profile-wrapper">

    <div class="row justify-content-center">
        <div class="col-md-6">

            <!-- 🔥 PROFILE CARD -->
            <div class="profile-card" th:if="${user != null}" th:object="${user}">

                <!-- HEADER -->
                <div class="profile-header">
                    <div class="avatar">
                        <span th:text="*{name.substring(0,1)}">A</span>
                    </div>

                    <div class="profile-name" th:text="*{name}">Name</div>
                    <div class="profile-email" th:text="*{email}">Email</div>
                </div>

                <!-- INFO GRID -->
                <div class="row g-3">

                    <div class="col-6">
                        <div class="info-box">
                            <div class="info-label">Age</div>
                            <div class="info-value" th:text="*{age}">0</div>
                        </div>
                    </div>

                    <div class="col-6">
                        <div class="info-box">
                            <div class="info-label">Gender</div>
                            <div class="info-value" th:text="*{gender}">-</div>
                        </div>
                    </div>

                    <div class="col-6">
                        <div class="info-box">
                            <div class="info-label">Height</div>
                            <div class="info-value" th:text="*{height} + ' cm'">0</div>
                        </div>
                    </div>

                    <div class="col-6">
                        <div class="info-box">
                            <div class="info-label">Weight</div>
                            <div class="info-value" th:text="*{weight} + ' kg'">0</div>
                        </div>
                    </div>

                </div>

                <!-- ACTION -->
                <div class="d-grid mt-4">
                    <a href="/profile/edit" class="btn btn-main">Edit Profile</a>
                </div>

            </div>

            <!-- 🔴 FALLBACK -->
            <div th:if="${user == null}" class="text-center mt-5">
                <h4>No user found 😢</h4>
                <a href="/auth/signin" class="btn btn-main mt-3">Login</a>
            </div>

        </div>
    </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Profile | FitTrack</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">

    <!-- 🔥 CHART JS -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa, #e4efe9);
            font-family: 'Segoe UI', sans-serif;
        }

        .profile-wrapper {
            margin-top: 100px;
        }

        /* 🔥 MAIN CARD */
        .profile-card {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
        }

        .profile-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .avatar {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #2f6b3e, #4ade80);
            border-radius: 50%;
            color: white;
            font-size: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: auto;
        }

        .profile-name {
            font-size: 22px;
            font-weight: 600;
            margin-top: 10px;
        }

        .profile-email {
            color: #777;
            font-size: 14px;
        }

        /* INFO GRID */
        .info-box {
            background: #f4f7fb;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            transition: 0.3s;
        }

        .info-box:hover {
            transform: translateY(-4px);
        }

        .info-label {
            font-size: 12px;
            color: #777;
        }

        .info-value {
            font-size: 18px;
            font-weight: 600;
        }

        /* 🔥 GRAPH CARD */
        .graph-card {
            margin-top: 25px;
            padding: 20px;
            border-radius: 16px;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(10px);
        }

        .btn-main {
            background: #2f6b3e;
            color: white;
            border-radius: 30px;
            padding: 10px;
        }

        .btn-main:hover {
            background: #255a33;
        }
    </style>
</head>

<body>

<!-- ✅ NAVBAR (UNCHANGED) -->
<nav th:replace="fragments/navbar :: navbar('profile')"></nav>

<div class="container profile-wrapper">

    <div class="row justify-content-center">
        <div class="col-md-8">

            <div class="profile-card" th:if="${user != null}" th:object="${user}">

                <!-- 🔥 PROFILE HEADER -->
                <div class="profile-header">
                    <div class="avatar">
                        <span th:text="*{name.substring(0,1)}">A</span>
                    </div>

                    <div class="profile-name" th:text="*{name}">Name</div>
                    <div class="profile-email" th:text="*{email}">Email</div>
                </div>

                <!-- 🔥 INFO GRID -->
                <div class="row g-3 text-center">

                    <div class="col-3">
                        <div class="info-box">
                            <div class="info-label">Age</div>
                            <div class="info-value" th:text="*{age}"></div>
                        </div>
                    </div>

                    <div class="col-3">
                        <div class="info-box">
                            <div class="info-label">Gender</div>
                            <div class="info-value" th:text="*{gender}"></div>
                        </div>
                    </div>

                    <div class="col-3">
                        <div class="info-box">
                            <div class="info-label">Height</div>
                            <div class="info-value" th:text="*{height} + ' cm'"></div>
                        </div>
                    </div>

                    <div class="col-3">
                        <div class="info-box">
                            <div class="info-label">Weight</div>
                            <div class="info-value" th:text="*{weight} + ' kg'"></div>
                        </div>
                    </div>

                </div>

                <!-- 🔥 CALORIES GRAPH -->
                <div class="graph-card">
                    <h5>🔥 Calories Burned (Weekly)</h5>
                    <canvas id="calorieChart"></canvas>
                </div>

                <!-- ACTION -->
                <div class="d-grid mt-4">
                    <a href="/profile/edit" class="btn btn-main">Edit Profile</a>
                </div>

            </div>

            <!-- FALLBACK -->
            <div th:if="${user == null}" class="text-center mt-5">
                <h4>No user found 😢</h4>
                <a href="/auth/signin" class="btn btn-main mt-3">Login</a>
            </div>

        </div>
    </div>

</div>

<!-- 🔥 CHART SCRIPT -->
<script th:inline="javascript">
    const labels = /*[[${days}]]*/ [];
    const data = /*[[${caloriesData}]]*/ [];

    console.log("Labels:", labels);
    console.log("Data:", data);

    const ctx = document.getElementById('calorieChart');

    new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Calories Burned',
                data: data,
                borderWidth: 3,
                tension: 0.4,
                fill: true,
                backgroundColor: 'rgba(47,107,62,0.1)',
                borderColor: '#2f6b3e'
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { display: false }
            },
            scales: {
                y: { beginAtZero: true }
            }
        }
    });
</script>

</body>
</html>

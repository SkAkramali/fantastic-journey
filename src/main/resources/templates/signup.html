<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register | FitTrack</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Global CSS -->
    <link rel="stylesheet" href="/css/styles.css">

    <style>
        body {
            margin: 0;
            font-family: 'Instrument Sans', sans-serif;
        }

        /* 🔥 BACKGROUND */
        .bg-wrapper {
            min-height: 100vh;

            background:
                linear-gradient(rgba(250,249,246,0.75), rgba(250,249,246,0.85)),
                url('https://images.unsplash.com/photo-1517836357463-d25dfeac3438');

            background-size: cover;
            background-position: center;
        }

        /* 🔥 CENTER ALIGN */
        .main-container {
            min-height: calc(100vh - 64px);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 🔥 CARD */
        .card {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(6px);
            border-radius: 18px;
            padding: 40px 35px;
            width: 100%;
            max-width: 420px;
            border: 1px solid rgba(0,0,0,0.08);
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }

        .form-title {
            font-family: 'Bricolage Grotesque';
            font-size: 1.9rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #777;
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        /* 🔥 FORM */
        form {
            display: flex;
            flex-direction: column;
        }

        .form-control, .form-select {
            width: 100%;
            border-radius: 12px;
            padding: 12px;
            border: 1px solid rgba(0,0,0,0.15);
            margin-bottom: 14px;
        }

        .form-control:focus, .form-select:focus {
            border-color: #2f6b3e;
            box-shadow: 0 0 0 3px rgba(47,107,62,0.15);
        }

        /* 🔥 ROW FIX */
        .row-gap {
            display: flex;
            gap: 12px;
        }

        .row-gap input {
            flex: 1;
        }

        .btn-primary {
            background: #2f6b3e;
            border: none;
            border-radius: 100px;
            padding: 12px;
            font-weight: 600;
            margin-top: 10px;
        }

        .btn-primary:hover {
            background: #255730;
        }

        .link {
            color: #2f6b3e;
            text-decoration: none;
            font-weight: 500;
        }

        .link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div th:replace="fragments/navbar :: navbar('signup')"></div>

<div class="bg-wrapper">

    <div class="main-container">

        <div class="card">

            <h3 class="form-title">Create your account</h3>
            <p class="subtitle">Start your fitness journey today 💪</p>

            <form action="/auth/signup" method="post">

                <input type="text" class="form-control" name="name" placeholder="Full Name" required>

                <input type="email" class="form-control" name="email" placeholder="Email address" required>

                <input type="password" class="form-control" name="password" placeholder="Password" required>

                <input type="number" class="form-control" name="age" placeholder="Age" required>

                <select class="form-select" name="gender" required>
                    <option value="">Select Gender</option>
                    <option value="MALE">Male</option>
                    <option value="FEMALE">Female</option>
                    <option value="OTHER">Other</option>
                </select>

                <!-- 🔥 CLEAN ROW -->
                <div class="row-gap">
                    <input type="number" step="0.1" class="form-control" name="height" placeholder="Height (cm)">
                    <input type="number" step="0.1" class="form-control" name="weight" placeholder="Weight (kg)">
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    Create Account
                </button>

            </form>

            <p style="text-align:center; margin-top:20px;">
                Already have an account?
                <a href="/auth/signin" class="link">Sign in</a>
            </p>

        </div>

    </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>

<aside th:fragment="adminNav(activePage)" class="admin-sidebar">

    <!-- LOGO -->
    <div class="as-logo">
        <a href="/admin/dashboard" class="as-logo-link">
            <div class="as-logo-mark">F</div>
            <div class="as-logo-text">
                <div class="as-brand">FitTrack</div>
                <div class="as-role">Admin Console</div>
            </div>
        </a>
    </div>

    <!-- NAV -->
    <nav class="as-nav">
        <div class="as-section-label">Overview</div>

        <a href="/admin/dashboard" class="as-item"
           th:classappend="${activePage == 'dashboard'} ? ' as-active'">
            <svg class="as-icon" viewBox="0 0 16 16" fill="none">
                <rect x="1" y="1" width="6" height="6" rx="1.2" stroke="currentColor" stroke-width="1.3"/>
                <rect x="9" y="1" width="6" height="6" rx="1.2" stroke="currentColor" stroke-width="1.3"/>
                <rect x="1" y="9" width="6" height="6" rx="1.2" stroke="currentColor" stroke-width="1.3"/>
                <rect x="9" y="9" width="6" height="6" rx="1.2" stroke="currentColor" stroke-width="1.3"/>
            </svg>
            Dashboard
        </a>

        <div class="as-section-label">Management</div>

        <a href="/admin/users" class="as-item"
           th:classappend="${activePage == 'users'} ? ' as-active'">
            <svg class="as-icon" viewBox="0 0 16 16" fill="none">
                <circle cx="6" cy="5" r="2.5" stroke="currentColor" stroke-width="1.3"/>
                <path d="M1 14c0-2.761 2.239-5 5-5s5 2.239 5 5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                <path d="M11 7.5c1.38 0 2.5 1.12 2.5 2.5 0 .55-.18 1.07-.48 1.49M13 14h2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            </svg>
            Users
        </a>

        <a href="/admin/dashboard" class="as-item"
           th:classappend="${activePage == 'workouts'} ? ' as-active'">
            <svg class="as-icon" viewBox="0 0 16 16" fill="none">
                <rect x="1" y="6.5" width="2.5" height="3" rx="0.8" stroke="currentColor" stroke-width="1.3"/>
                <rect x="12.5" y="6.5" width="2.5" height="3" rx="0.8" stroke="currentColor" stroke-width="1.3"/>
                <rect x="3.5" y="4.5" width="9" height="7" rx="1" stroke="currentColor" stroke-width="1.3"/>
                <rect x="6.5" y="2.5" width="3" height="11" rx="1" stroke="currentColor" stroke-width="1.3"/>
            </svg>
            Activity
        </a>
    </nav>

    <!-- FOOTER -->
    <div class="as-footer">
        <a href="/" class="as-footer-link" target="_blank">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                <path d="M5.5 2.5H2a1 1 0 00-1 1v7.5a1 1 0 001 1h7.5a1 1 0 001-1V8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                <path d="M7.5 1.5h4v4M11.5 1.5l-5 5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            View Site
        </a>
        <a href="/admin/logout" class="as-logout">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                <path d="M4.5 6.5h6M8 4l2.5 2.5L8 9" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M5.5 3H3a1 1 0 00-1 1v5a1 1 0 001 1h2.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
            </svg>
            Sign Out
        </a>
    </div>

</aside>

</body>
</html>

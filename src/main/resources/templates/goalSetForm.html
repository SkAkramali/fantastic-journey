<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Set Goal</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Global CSS -->
    <link rel="stylesheet" href="/css/styles.css">

    <style>
        body {
            font-family: 'Instrument Sans', sans-serif;
            margin: 0;

            background: linear-gradient(
                rgba(15,23,42,0.7),
                rgba(15,23,42,0.7)
            ),
            url('https://images.unsplash.com/photo-1558611848-73f7eb4001a1') center/cover no-repeat;

            min-height: 100vh;

            /* 🔥 FIX FOR VERTICAL ALIGNMENT */
            display: flex;
            flex-direction: column;
        }

        .container-box {
            flex: 1; /* 🔥 IMPORTANT */
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .goal-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 18px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);

            /* optional polish */
            transform: translateY(-10px);
        }

        .title {
            font-family: 'Bricolage Grotesque';
            font-size: 2rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        .form-control, .form-select {
            border-radius: 12px;
            padding: 14px;
            border: 1px solid rgba(0,0,0,0.15);
            margin-bottom: 18px;
            font-size: 0.95rem;
            width: 100%;
        }

        .form-control:focus, .form-select:focus {
            border-color: #2f6b3e;
            box-shadow: 0 0 0 3px rgba(47,107,62,0.2);
            outline: none;
        }

        .btn-main {
            background: #2f6b3e;
            border: none;
            color: white;
            border-radius: 100px;
            padding: 14px;
            font-weight: 600;
            transition: 0.2s;
            width: 100%;
        }

        .btn-main:hover {
            background: #255730;
            transform: translateY(-1px);
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div th:replace="~{fragments/navbar :: navbar('goal')}"></div>

<div class="container-box">

    <div class="goal-card">

        <div class="title">🎯 Set Your Goal</div>
        <div class="subtitle">Stay focused. Stay consistent.</div>

        <form action="/dashboard/setGoal" method="post">

            <!-- Goal Type -->
            <select name="goalType" class="form-select" required>
                <option value="">Select Goal Type</option>
                <option value="WEIGHT_LOSS">Weight Loss</option>
                <option value="WEIGHT_GAIN">Weight Gain</option>
                <option value="CALORIES">Calories Burn</option>
                <option value="WORKOUTS">Workout Count</option>
            </select>

            <!-- Target Value -->
            <input type="number"
                   step="0.1"
                   name="targetValue"
                   class="form-control"
                   placeholder="Target Value (e.g. 5 kg / 2000 cal)"
                   required>

            <!-- Target Date -->
            <input type="date"
                   name="targetDate"
                   class="form-control"
                   required>

            <!-- Notes -->
            <textarea name="notes"
                      class="form-control"
                      placeholder="Optional note..."></textarea>

            <!-- Submit -->
            <button type="submit" class="btn-main">
                🚀 Set Goal
            </button>

        </form>

    </div>

</div>

</body>
</html>
